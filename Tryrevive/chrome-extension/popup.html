<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Tryrevive Popup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap');

    body {
      width: 280px;
      margin: 0;
      padding: 1.25rem;
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #111418;
      color: #FFFFFF;
    }

    .header {
      text-align: center;
      margin-bottom: 1rem;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
      padding-bottom: 0.8rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 500;
      color: #FFFFFF;
      margin: 0;
    }

    .subtitle {
      font-size: 0.68rem;
      color: #FF8A65;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 0.25rem;
    }

    .site-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }

    .site-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1A1D24;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
    }

    .site-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: #E2E8F0;
    }

    .site-time {
      font-size: 0.75rem;
      font-family: monospace;
      color: #FF8A65;
    }

    .btn-action {
      display: block;
      width: 100%;
      background: #FF8A65;
      color: #111418;
      border: none;
      padding: 0.65rem;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      box-shadow: none;
      transition: background 0.2s ease;
      box-sizing: border-box;
    }

    .btn-action:hover {
      background: #FFA185;
    }

    .footer {
      text-align: center;
      font-size: 0.62rem;
      color: #8E95A1;
      margin-top: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">Tryrevive</h1>
    <div class="subtitle">Attention Guard</div>
  </div>

  <div class="site-list" id="site-list">
    <!-- Dynamic site times injected here -->
    <div class="site-item" style="justify-content: center; opacity: 0.5;">
      <span class="site-name" style="font-size: 0.75rem;">正在监测注意力流...</span>
    </div>
  </div>

  <button id="open-app-btn" class="btn-action">进入 Tryrevive 主面板</button>

  <div class="footer">
    © 2026 Rowan. Designed with Restraint.
  </div>

  <script src="popup.js"></script>
</body>
</html>
